<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeHive – automatyzacja dla freelancerów</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #0f172a; color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
    .container { max-width: 800px; text-align: center; }
    h1 { font-size: 3.5rem; font-weight: 700; background: linear-gradient(135deg, #facc15, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { font-size: 1.3rem; margin: 1.5rem 0; color: #94a3b8; }
    .features { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; margin: 2.5rem 0; }
    .feature { background: #1e293b; padding: 1.5rem; border-radius: 1rem; flex: 1 1 200px; border-left: 4px solid #facc15; }
    .btn { background: #facc15; color: #0f172a; padding: 1rem 2.5rem; border-radius: 2rem; font-weight: 700; text-decoration: none; display: inline-block; font-size: 1.2rem; transition: 0.3s; }
    .btn:hover { background: #eab308; transform: scale(1.03); }
    .footer { margin-top: 3rem; font-size: 0.9rem; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐝 TimeHive</h1>
    <p class="sub">Automatyzacja dla freelancerów – faktury, przypomnienia, czas</p>
    <div class="features">
      <div class="feature">📅 Automatyczne przypomnienia o terminach</div>
      <div class="feature">📄 Faktury PDF generowane jednym kliknięciem</div>
      <div class="feature">⏱ Śledzenie czasu pracy w tle</div>
    </div>
    <a href="#" class="btn">Rozpocznij za darmo</a>
    <div class="footer">Pierwszy miesiąc gratis – bez karty kredytowej</div>
  </div>
</body>
</html>
